# 修复 PR 自动反向移植到 v2
#
# 当 release/v* 分支被推送（通常是 hotfix PR 合并）时：
#   → 从 commit 标题解析 PR 号（要求形如 `... (#1234)`）
#   → cherry-pick 该提交到基于 v2 的 fix/pr-<N> 分支
#   → 自动创建从 fix/pr-<N> 到 v2 的 PR
#
# 使用 push 而非 pull_request closed：
#   fork PR 合并时 pull_request 事件拿不到仓库 secrets/vars，
#   而 push 始终发生在本仓库，App token 可正常生成。
#
# cherry-pick 的 commit 会自动追加 [skip changelog]，
# 防止反向移植的修复在后续版本的 changelog 中重复出现。

name: cherry-pick-to-v2

on:
  push:
    branches:
      - 'release/v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  cherry-pick:
    if: github.repository_owner == 'MaaEnd'
    runs-on: ubuntu-latest

    steps:
      - name: Parse push commit for PR number
        id: pr
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          MERGE_SHA: ${{ github.sha }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # head_commit.message 为完整 message，取第一行作为 subject
          SUBJECT="$(printf '%s' "$COMMIT_MESSAGE" | head -n1)"

          if [[ ! "$SUBJECT" =~ \(#([0-9]+)\)$ ]]; then
            echo "Commit subject has no trailing (#N) PR reference: '$SUBJECT'"
            echo "Skipping (likely a direct push, not a merged PR)."
            echo "proceed=false" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER="${BASH_REMATCH[1]}"
          FIX_BRANCH="fix/pr-${PR_NUMBER}"

          echo "pr_number=${PR_NUMBER}" | tee -a "$GITHUB_OUTPUT"
          echo "merge_sha=${MERGE_SHA}" | tee -a "$GITHUB_OUTPUT"
          echo "release_branch=${RELEASE_BRANCH}" | tee -a "$GITHUB_OUTPUT"
          echo "fix_branch=${FIX_BRANCH}" | tee -a "$GITHUB_OUTPUT"
          echo "proceed=true" | tee -a "$GITHUB_OUTPUT"

          echo "Processing push on ${RELEASE_BRANCH}"
          echo "  Commit: ${MERGE_SHA}"
          echo "  Subject: ${SUBJECT}"
          echo "  PR: #${PR_NUMBER}"

      # 分支存在检查放在 checkout 之前，避免全量 clone 后发现分支已存在
      - name: Check if fix branch already exists
        if: steps.pr.outputs.proceed == 'true'
        id: precheck
        env:
          FIX_BRANCH: ${{ steps.pr.outputs.fix_branch }}
        run: |
          set -euo pipefail

          if git ls-remote --heads "https://github.com/${{ github.repository }}" "$FIX_BRANCH" | grep -q .; then
            echo "Fix branch $FIX_BRANCH already exists on remote. Skipping cherry-pick."
            echo "exists=true" | tee -a "$GITHUB_OUTPUT"
          else
            echo "exists=false" | tee -a "$GITHUB_OUTPUT"
          fi

      - name: Generate MaaEndBot GitHub App token
        if: steps.pr.outputs.proceed == 'true' && steps.precheck.outputs.exists != 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.MAAEND_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.MAAEND_BOT_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Fetch PR title and body
        if: steps.pr.outputs.proceed == 'true' && steps.precheck.outputs.exists != 'true'
        id: pr-details
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          PR_JSON="$(gh pr view "$PR_NUMBER" --json title,body)"
          PR_TITLE="$(printf '%s' "$PR_JSON" | python3 -c 'import json,sys; print(json.load(sys.stdin)["title"])')"
          PR_BODY="$(printf '%s' "$PR_JSON" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("body") or "")')"

          {
            echo "pr_title<<PRTITLE_EOF"
            echo "$PR_TITLE"
            echo "PRTITLE_EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "pr_body<<PRBODY_EOF"
            echo "$PR_BODY"
            echo "PRBODY_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "PR #${PR_NUMBER} title: ${PR_TITLE}"

      - name: Checkout repository
        if: steps.pr.outputs.proceed == 'true' && steps.precheck.outputs.exists != 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: v2
          # cherry-pick 需要访问 release 分支上的 commit，必须全量 clone
          fetch-depth: 0

      - name: Cherry-pick merge commit and push fix branch
        if: steps.pr.outputs.proceed == 'true' && steps.precheck.outputs.exists != 'true'
        id: cherry
        env:
          FIX_BRANCH: ${{ steps.pr.outputs.fix_branch }}
          MERGE_SHA: ${{ steps.pr.outputs.merge_sha }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$FIX_BRANCH"

          # 用 git cat-file 检测是否为 merge commit（有多个 parent），
          # 比依赖 git 英文错误消息更可靠
          PARENT_COUNT=$(git cat-file -p "$MERGE_SHA" | grep -c '^parent ' || true)

          echo "Cherry-picking commit: $MERGE_SHA (parents: $PARENT_COUNT)"

          if [ "$PARENT_COUNT" -le 1 ]; then
            git cherry-pick -x "$MERGE_SHA"
          else
            echo "Merge commit detected, using -m 1 -x"
            git cherry-pick -m 1 -x "$MERGE_SHA"
          fi

          # 追加 [skip changelog]，避免反向移植 commit 出现在后续版本的 changelog 中。
          # 原始 fix 已在对应正式版的 changelog 体现，后续 RC/beta 不应再计入。
          git log -1 --format=%B > /tmp/commit_msg.txt
          if ! grep -qF '[skip changelog]' /tmp/commit_msg.txt; then
            echo "" >> /tmp/commit_msg.txt
            echo "[skip changelog]" >> /tmp/commit_msg.txt
          fi
          git commit --amend -F /tmp/commit_msg.txt

          git push origin "$FIX_BRANCH"

      - name: Create pull request to v2
        if: steps.pr.outputs.proceed == 'true' && steps.precheck.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FIX_BRANCH: ${{ steps.pr.outputs.fix_branch }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr-details.outputs.pr_title }}
          PR_BODY: ${{ steps.pr-details.outputs.pr_body }}
          RELEASE_BRANCH: ${{ steps.pr.outputs.release_branch }}
        run: |
          set -euo pipefail

          EXISTING_PR="$(gh pr list --base v2 --head "$FIX_BRANCH" --state open --json number --jq '.[0].number // empty')"

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #${EXISTING_PR}. No new PR created."
            exit 0
          fi

          # 用 python 拼接原 PR body + footer，避免 shell 注入
          PR_BODY="$(python3 -c "
          import os
          original = os.environ.get('PR_BODY', '') or ''
          n = os.environ['PR_NUMBER']
          r = os.environ['RELEASE_BRANCH']
          footer = (
              '\n\n---\n\n'
              f'> Cherry-pick of #{n} from \`{r}\` to \`v2\`.\n'
              '[skip changelog]'
          )
          print(original.rstrip() + footer)
          ")"

          gh pr create \
            --base v2 \
            --head "$FIX_BRANCH" \
            --title "${PR_TITLE} (cherry-pick of #${PR_NUMBER})" \
            --body "$PR_BODY"
