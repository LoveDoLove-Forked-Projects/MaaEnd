name: format

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16,22 * * *" # UTC+8 0:00, 06:00

jobs:
  format:
    if: ${{ github.repository_owner == 'MaaEnd' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate MaaEndBot GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.MAAEND_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.MAAEND_BOT_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          show-progress: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache-dependency-path: agent/go-service/go.sum

      - name: Install dependencies
        run: pnpm install

      - name: Run format
        run: pnpm format:all

      - name: Format C++ source
        run: |
          git ls-files -z -- \
            'agent/cpp-algo/source/*.cpp' \
            'agent/cpp-algo/source/*.h' \
            'agent/cpp-algo/source/**/*.cpp' \
            'agent/cpp-algo/source/**/*.h' |
            xargs -0 -r clang-format-17 -i

      - name: Commit and push changes
        uses: actions-js/push@master
        with:
          rebase: true
          branch: ${{ github.ref }}
          message: "style: auto format code

            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            [skip changelog]"
          github_token: ${{ steps.app-token.outputs.token }}
