name: Sync QQ Groups

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate MaaEndBot GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.MAAEND_BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.MAAEND_BOT_APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          show-progress: false

      - name: Sync QQ group references
        run: |
          python3 .github/scripts/sync_qq_groups.py

      - name: Commit and push
        uses: actions-js/push@master
        with:
          rebase: true
          branch: ${{ github.ref }}
          message: "chore: sync QQ group info

            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            [skip changelog]"
          github_token: ${{ steps.app-token.outputs.token }}
